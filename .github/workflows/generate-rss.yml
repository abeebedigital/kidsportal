name: Generate RSS Feed

on:
  push:
    branches:
      - main
      - master
    paths:
      - "*.html"
      - "CNAME"
      - "scripts/generate-rss.js"
      - ".github/workflows/generate-rss.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-rss:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate rss.xml and feed.xml
        run: node scripts/generate-rss.js

      - name: Commit updated feeds
        run: |
          if git diff --quiet -- rss.xml feed.xml; then
            echo "No feed changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rss.xml feed.xml
          git commit -m "chore: update rss feeds [skip ci]"
          git push
