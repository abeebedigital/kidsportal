name: Generate Selective Search Index

on:
  push:
    branches:
      - main
      - master
    paths:
      - "selective-*.html"
      - "scripts/generate-selective-search-index.js"
      - ".github/workflows/generate-selective-search-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-selective-search-index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate selective-search-index.js
        run: node scripts/generate-selective-search-index.js

      - name: Commit updated selective search index
        run: |
          if git diff --quiet -- selective-search-index.js; then
            echo "No selective index changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add selective-search-index.js
          git commit -m "chore: update selective search index [skip ci]"
          git push
