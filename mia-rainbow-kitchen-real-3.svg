<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Rainbow Friends lineup in magical kitchen">
  <defs>
    <linearGradient id="bgWash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5f4fa8"/>
      <stop offset="52%" stop-color="#8a74cf"/>
      <stop offset="100%" stop-color="#dfaa72"/>
    </linearGradient>
    <filter id="paperGrain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="3" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
    </filter>
    <radialGradient id="lightBloom" cx="30%" cy="22%" r="48%">
      <stop offset="0%" stop-color="#fff8d8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fff8d8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="900" fill="url(#bgWash)"/>
  <rect width="1400" height="900" fill="url(#lightBloom)"/>
  <rect width="1400" height="900" filter="url(#paperGrain)"/>

  <g>

    <rect x="96" y="124" width="1208" height="650" rx="44" fill="rgba(255,255,255,0.20)"/>
    <text x="700" y="214" text-anchor="middle" font-family="Georgia, serif" font-size="60" fill="#fff7ea">Rainbow Friends</text>
    <g font-family="'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif" font-size="102" text-anchor="middle">
      <text x="250" y="390">🍅</text><text x="480" y="390">🥦</text><text x="700" y="390">🌽</text><text x="920" y="390">🫐</text><text x="1150" y="390">🍊</text>
    </g>
    <g font-family="Georgia, serif" fill="#fff8e8" text-anchor="middle" opacity="0.94">
      <text x="250" y="454" font-size="38">Ruby</text><text x="250" y="492" font-size="29">Strong Heart</text>
      <text x="480" y="454" font-size="38">Benny</text><text x="480" y="492" font-size="29">Strong Bones</text>
      <text x="700" y="454" font-size="38">Sunny</text><text x="700" y="492" font-size="29">Bright Energy</text>
      <text x="920" y="454" font-size="38">Bella</text><text x="920" y="492" font-size="29">Sharp Mind</text>
      <text x="1150" y="454" font-size="38">Otto</text><text x="1150" y="492" font-size="29">Fights Colds</text>
    </g>
    <text x="700" y="612" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="#fff2ca">"Every colour makes you stronger."</text>
    <text x="700" y="702" text-anchor="middle" font-size="70" font-family="'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif">🥕 ✨ 🍓</text>
    
  </g>
</svg>
